name: Frontend CI/CD

on:
  push:
    branches: [master]
    paths: ["frontend/**", ".github/workflows/frontend.yml"]
  pull_request:
    paths: ["frontend/**", ".github/workflows/frontend.yml"]

jobs:
  # ── CI: lint → typecheck → test → build ───────────────────────────────────
  ci:
    name: Lint / Type-check / Test / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc -b

      - name: Run tests
        run: npm test

      - name: Build
        run: npx vite build
        env:
          # Provide minimal env vars so Vite doesn't error on missing VITE_* at build time.
          # Real values are set in Cloudflare Pages dashboard (Settings → Environment Variables).
          VITE_OPNET_NETWORK: testnet

  # ── Deploy: Cloudflare Pages (push to master only) ────────────────────────
  deploy:
    name: Deploy to Cloudflare Pages
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npx vite build
        env:
          VITE_OPNET_NETWORK: testnet
          VITE_OPNET_RPC_URL: https://testnet.opnet.org
          VITE_POOL_ADDRESS: ${{ vars.VITE_POOL_ADDRESS }}
          VITE_FACTORY_ADDRESS: ${{ vars.VITE_FACTORY_ADDRESS }}
          VITE_INDEXER_URL: ${{ vars.VITE_INDEXER_URL }}

      - name: Ensure Cloudflare Pages project exists
        run: npx wrangler pages project create frogop-frontend --production-branch=master || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=frogop-frontend --commit-dirty=true
          workingDirectory: frontend
