name: Frontend CI/CD

on:
  push:
    branches: [master]
    paths: ["frontend/**", ".github/workflows/frontend.yml"]
  pull_request:
    paths: ["frontend/**", ".github/workflows/frontend.yml"]

jobs:
  # ── CI: lint → typecheck → test → build ───────────────────────────────────
  ci:
    name: Lint / Type-check / Test / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc -b

      - name: Run tests
        run: npm test

      - name: Build
        run: npx vite build
        env:
          # Provide minimal env vars so Vite doesn't error on missing VITE_* at build time.
          # Real values are set in Cloudflare Pages dashboard (Settings → Environment Variables).
          VITE_OPNET_NETWORK: testnet

  # ── Deploy: Cloudflare Workers Static Assets (push to master only) ────────
  deploy:
    name: Deploy to Cloudflare Workers
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npx vite build
        env:
          VITE_OPNET_NETWORK: testnet
          VITE_OPNET_RPC_URL: https://testnet.opnet.org
          VITE_POOL_ADDRESS: opt1sqze2thmp29pkkj8ft8qll0383k3ek4sgvvfqd9r5
          VITE_INDEXER_URL: https://api.frogop.net

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: frontend

  # ── Deploy Mainnet: separate Workers deployment ──────────────────────────
  deploy-mainnet:
    name: Deploy to Cloudflare Workers (Mainnet)
    needs: ci
    if: >-
      github.ref == 'refs/heads/master' &&
      github.event_name == 'push' &&
      vars.MAINNET_POOL_ADDRESS != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for production (mainnet)
        run: npx vite build
        env:
          VITE_OPNET_NETWORK: mainnet
          VITE_OPNET_RPC_URL: https://mainnet.opnet.org
          VITE_POOL_ADDRESS: ${{ vars.MAINNET_POOL_ADDRESS }}
          VITE_INDEXER_URL: ${{ vars.MAINNET_INDEXER_URL }}

      - name: Deploy to Cloudflare Workers (mainnet)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.mainnet.toml
          workingDirectory: frontend
