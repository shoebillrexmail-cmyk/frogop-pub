name = "frogop-indexer"
main = "src/worker.ts"
compatibility_date = "2026-03-01"

# nodejs_compat: polyfills Buffer, process, etc. required by opnet + @btc-vision packages
compatibility_flags = ["nodejs_compat"]

# Custom domain — Cloudflare handles DNS + SSL automatically.
# No dashboard click needed after wrangler deploy.
routes = [
  { pattern = "api.frogop.net", custom_domain = true }
]

[triggers]
# Testnet blocks ~10 min — poll every 5 min (free tier minimum)
crons = ["*/5 * * * *"]

# ---------------------------------------------------------------------------
# D1 — managed SQLite
# Run `npm run db:create` once to provision, then fill in the database_id below
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "frogop-indexer"
database_id = "2a80cb38-da06-438b-9224-3cc1c71c5f2b"

# ---------------------------------------------------------------------------
# Non-secret config (committed). Secrets go via `wrangler secret put`.
# ---------------------------------------------------------------------------
[vars]
OPNET_NETWORK    = "opnetTestnet"
OPNET_RPC_URL    = "https://testnet.opnet.org"
# Space-separated bech32 pool addresses to track (6 pools: moto-pill, pill-moto, moto-btc, btc-moto, pill-btc, btc-pill)
# After deploying new pools, run: npx tsx scripts/deploy-pool.ts --deploy-all --no-wait
# The script prints all POOL_ADDRESSES at the end — paste them here.
POOL_ADDRESSES   = "opt1sqze2thmp29pkkj8ft8qll0383k3ek4sgvvfqd9r5 opt1sqqp2au6ns9kgyh86dc7q0z6hykzd6f6tccwp38s4 opt1sqqgsmcsqjkrdnr3xl9p9ygt9pmt8zvfap5ln62gr opt1sqzxk23tvmg3kvttypp3y582hmlm69lt8sgr2tu44 opt1sqzfsd34xx00mfrvkqarznxpfueun6qu2dcv0c442 opt1sqrp8pt6gf3u8gpxy7p63vxqhezvvlfjccyjd0kx6"
FACTORY_ADDRESS  = "opt1sqz4wm6z6gy2rrfsqxf0tuh6tkyn32eerkg57nrka"
# Max blocks to process per cron invocation (prevents CPU timeout on catch-up)
MAX_BLOCKS_PER_RUN = "20"
# NativeSwap price tracking
# Router: the single NativeSwap contract (0x-prefixed hex)
NATIVESWAP_CONTRACT = "0x4397befe4e067390596b3c296e77fe86589487bf3bf3f0a9a93ce794e2d78fb5"
# Token addresses to poll getQuote for (space-separated, 0x-prefixed hex)
# MOTO = 0xfd44..., PILL = 0xb09f...
NATIVESWAP_TOKEN_ADDRESSES = "0xfd4473840751d58d9f8b73bdd57d6c5260453d5518bd7cd02d0a4cf3df9bf4dd 0xb09fc29c112af8293539477e23d8df1d3126639642767d707277131352040cbb"
# Token labels matching NATIVESWAP_TOKEN_ADDRESSES order (comma-separated)
# BTC cross-rates (MOTO_BTC, PILL_BTC) are derived automatically from getQuote data.
# Reverse pairs (BTC_MOTO, BTC_PILL, PILL_MOTO) are computed at query time via inversion.
NATIVESWAP_LABELS = "MOTO,PILL"

# ---------------------------------------------------------------------------
# Observability — logs, traces
# ---------------------------------------------------------------------------
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
